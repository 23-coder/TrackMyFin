# ─── Production profile (active when SPRING_PROFILES_ACTIVE=prod on Render) ───

# ─── PostgreSQL (Neon) ────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# "update" keeps data between restarts; use "create" only on first deploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Disable H2 console in production ─────────────────────────────────────────
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration
