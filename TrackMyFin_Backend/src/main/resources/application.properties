# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── H2 In-Memory Database (development — no MySQL/PostgreSQL needed) ─────────
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Override these in .env (JWT_SECRET / JWT_EXPIRATION) or as environment variables.
jwt.secret=${JWT_SECRET:TrackMyFinDefaultSecretKeyThatIsAtLeast256BitsLongForHMACSHA256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Gemini AI ────────────────────────────────────────────────────────────────
# The main() method reads GEMINI_API_KEY from .env and sets the system property
# "gemini.api.key" before Spring starts — Spring picks it up automatically.
# The empty default here prevents startup failure when no key is configured.
gemini.api.key=${gemini.api.key:}
gemini.model=${gemini.model:gemini-2.5-flash}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.financetracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
